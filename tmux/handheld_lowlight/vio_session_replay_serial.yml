# do not modify these
root: ./
name: handheld_lowlight
socket_name: mrs
attach: true
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
startup_window: open_vins
#pre_window: export UAV_NAME=uav1; export RMW_IMPLEMENTATION=rmw_zenoh_cpp
pre_window: export UAV_NAME=uav1
windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - rviz:
      layout: tiled
      panes:
        - ros2 run rviz2 rviz2 --display-config rviz.rviz
  - serial_msckf:
      layout: tiled
      panes:
        - ros2 launch ov_msckf serial_composable.launch.py topic_camera0:=/uav1/bluefox/image_raw/compressed path_bag:=$(cat bag_file_path)
  - path_eval:
      layout: tiled
      panes:
        - python3 path_distance_node.py --ros-args -p path_topic:=/serial_msckf/pathimu_out