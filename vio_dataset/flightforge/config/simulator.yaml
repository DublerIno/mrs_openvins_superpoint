uav_names: [
  "uav1",
]

frames:
  fcu:
    publish_tf: false

uav1:

  frame: "x500"
  type: "x500"
  spawn:
    x: 0.0
    y: 0.0
    z: 0.0
    heading: 0.0

mrs_uav_flightforge_simulator:

  sensors:

    lidar:

      enabled: false

    rgb:

      rate: 20 # [Hz]

      enabled: true

      rgb_segmented:
        enabled: false
        rate: 10.0 # [Hz]

      depth:
        enabled: false

    stereo:
      enabled: false

  graphics_settings: "low"

  realtime_factor: 0.5 # [-]

  world_name: "valley" # works in Lite
  #world_name: "warehouse" # works in Lite

  # TODO
  # world_name: "cave" # does not work
  # world_name: "dead_spruce_forest" # does not work
  # world_name: "infinite_forest" # does not work
  #world_name: "forest" # does not work

  # weather_type: "cloudy"

  daytime:

    hour: 15
    minute: 30
