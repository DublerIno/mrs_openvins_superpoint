name: docker
root: ./
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
startup_window: rosbag

pre_window: export UAV_NAME=uav1; export USE_SIM_TIME="true"; export RMW_IMPLEMENTATION=rmw_zenoh_cpp; export OV_CONFIG_PATH="${OV_CONFIG_PATH}"; export OV_SUPERPOINT_PYTHON="${OV_SUPERPOINT_PYTHON}"


windows:
  - rosbag:
      layout: even-vertical
      panes:
        - ./play.sh
        - ./republish.sh
        - ./rviz.sh
        - ros2 run rmw_zenoh_cpp rmw_zenohd

  - vio:
      layout: tiled
      panes:
        - echo "OV_CONFIG_PATH=${OV_CONFIG_PATH}"; echo "OV_SUPERPOINT_PYTHON=${OV_SUPERPOINT_PYTHON}"; ${OV_SUPERPOINT_PYTHON} --version || true; ros2 launch mrs_open_vins_core open_vins.launch.py config_path:="${OV_CONFIG_PATH}"
