name: ov_tracking
root: /home/sponer/ws_openvins_superpoint
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
startup_window: tracking

pre_window: source /opt/ros/jazzy/setup.bash; source /home/sponer/ws_openvins_superpoint/install/setup.bash; export UAV_NAME=uav1; export USE_SIM_TIME="true"; export RMW_IMPLEMENTATION=rmw_zenoh_cpp; export OV_BAG_PATH="${OV_BAG_PATH}"; export OV_CONFIG_PATH="${OV_CONFIG_PATH}"

windows:
  - tracking:
      layout: even-vertical
      panes:
        - echo "OV_BAG_PATH=${OV_BAG_PATH}"; echo "OV_CONFIG_PATH=${OV_CONFIG_PATH}"; echo "Ready. Run commands here if you want manual control."
        - ros2 run ov_core test_tracking "${OV_CONFIG_PATH}" --ros-args -p path_bag:="${OV_BAG_PATH}" -p bag_storage_id:=auto -p tracker_type:=DESCRIPTOR -p max_cameras:=1 -p use_stereo:=false -p image_scale:=0.5 -p enable_dynamic_mask:=false
