name: ov_tracking
root: /home/sponer/ws_openvins_superpoint
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
startup_window: tracking

pre_window: source /opt/ros/jazzy/setup.bash; source /home/sponer/ws_openvins_superpoint/install/setup.bash; export UAV_NAME=uav1; export USE_SIM_TIME="true"; export RMW_IMPLEMENTATION=rmw_zenoh_cpp; export OV_BAG_PATH="${OV_BAG_PATH}"; export OV_CONFIG_PATH="${OV_CONFIG_PATH}"; export OV_SUPERPOINT_PYTHON="${OV_SUPERPOINT_PYTHON}"; export OV_PREPROCESS_LIGHT_ENABLE="${OV_PREPROCESS_LIGHT_ENABLE}"; export OV_PREPROCESS_LIGHT_ALPHA="${OV_PREPROCESS_LIGHT_ALPHA}"; export OV_PREPROCESS_LIGHT_BETA="${OV_PREPROCESS_LIGHT_BETA}"; export OV_PREPROCESS_LIGHT_GAMMA="${OV_PREPROCESS_LIGHT_GAMMA}"; export OV_PREPROCESS_LIGHT_FLICKER_AMPLITUDE="${OV_PREPROCESS_LIGHT_FLICKER_AMPLITUDE}"; export OV_PREPROCESS_LIGHT_FLICKER_PERIOD="${OV_PREPROCESS_LIGHT_FLICKER_PERIOD}"

windows:
  - tracking:
      layout: even-vertical
      panes:
        - echo "OV_BAG_PATH=${OV_BAG_PATH}"; echo "OV_CONFIG_PATH=${OV_CONFIG_PATH}"; echo "OV_SUPERPOINT_PYTHON=${OV_SUPERPOINT_PYTHON}"; echo "OV_PREPROCESS_LIGHT_ENABLE=${OV_PREPROCESS_LIGHT_ENABLE}"; echo "OV_PREPROCESS_LIGHT_ALPHA=${OV_PREPROCESS_LIGHT_ALPHA}"; echo "OV_PREPROCESS_LIGHT_BETA=${OV_PREPROCESS_LIGHT_BETA}"; echo "OV_PREPROCESS_LIGHT_GAMMA=${OV_PREPROCESS_LIGHT_GAMMA}"; echo "OV_PREPROCESS_LIGHT_FLICKER_AMPLITUDE=${OV_PREPROCESS_LIGHT_FLICKER_AMPLITUDE}"; echo "OV_PREPROCESS_LIGHT_FLICKER_PERIOD=${OV_PREPROCESS_LIGHT_FLICKER_PERIOD}"; ${OV_SUPERPOINT_PYTHON} --version || true; echo "Ready. Run commands here if you want manual control."
        - ros2 run ov_core test_tracking "${OV_CONFIG_PATH}" --ros-args -p path_bag:="${OV_BAG_PATH}" -p bag_storage_id:=auto -p tracker_type:=DESCRIPTOR -p max_cameras:=1 -p use_stereo:=false -p image_scale:=1.0 -p enable_dynamic_mask:=false -p preprocess_light_enable:=${OV_PREPROCESS_LIGHT_ENABLE} -p preprocess_light_alpha:=${OV_PREPROCESS_LIGHT_ALPHA} -p preprocess_light_beta:=${OV_PREPROCESS_LIGHT_BETA} -p preprocess_light_gamma:=${OV_PREPROCESS_LIGHT_GAMMA} -p preprocess_light_flicker_amplitude:=${OV_PREPROCESS_LIGHT_FLICKER_AMPLITUDE} -p preprocess_light_flicker_period:=${OV_PREPROCESS_LIGHT_FLICKER_PERIOD}
